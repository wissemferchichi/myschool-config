server.port=8080
spring.application.name=gateway
spring.main.web-application-type=reactive

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Routes - Version simplifiée pour test
spring.cloud.gateway.routes[0].id=userservice
spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**


# Routes - CORRIGÉ avec le bon nom
spring.cloud.gateway.routes[1].id=coursesservice
spring.cloud.gateway.routes[1].uri=lb://COURSESSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/courses/**,/api/coursesservice/**
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Origin


# NOUVELLE ROUTE POUR LES FICHIERS UPLOADS
spring.cloud.gateway.routes[2].id=courses-files
spring.cloud.gateway.routes[2].uri=lb://COURSESSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/uploads/**
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Origin
# Route pour les quizzes
spring.cloud.gateway.routes[3].id=quiz-service
spring.cloud.gateway.routes[3].uri=lb://COURSESSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/quizzes/**
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Origin
