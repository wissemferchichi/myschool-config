server.port=8080
spring.application.name=gateway
spring.main.web-application-type=reactive

# Eureka
eureka.client.service-url.defaultZone=http://discovery:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Routes
# 1. Authentification
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 2. User Service API
spring.cloud.gateway.routes[1].id=userservice-api
spring.cloud.gateway.routes[1].uri=lb://USERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Origin

# 3. Course Service
spring.cloud.gateway.routes[2].id=courseservice
spring.cloud.gateway.routes[2].uri=lb://COURSESERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/courses/**,/api/courseservice/**
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Origin

# 4. Course Files
spring.cloud.gateway.routes[3].id=courses-files
spring.cloud.gateway.routes[3].uri=lb://COURSESERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/uploads/**
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Origin

# 5. Quiz Service
spring.cloud.gateway.routes[4].id=quiz-service
spring.cloud.gateway.routes[4].uri=lb://COURSESERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/quizzes/**
spring.cloud.gateway.routes[4].filters[0]=RemoveRequestHeader=Origin

# 6. Statistics Service
spring.cloud.gateway.routes[5].id=statistics-service
spring.cloud.gateway.routes[5].uri=lb://COURSESERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/statistics/**
spring.cloud.gateway.routes[5].filters[0]=RemoveRequestHeader=Origin

# ACTUATOR & PROMETHEUS
management.endpoints.web.exposure.include=health,info,metrics,env,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.sla.http.server.requests=1ms,5ms,10ms,50ms,100ms,200ms,500ms,1s,2s

# CORS
cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

server.error.include-message=always
